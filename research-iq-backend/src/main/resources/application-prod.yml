spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 15
      minimum-idle: 5
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    url: ${DB_URL}
    user: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    validate-on-migrate: true
    baseline-on-migrate: true
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration

logging:
  level:
    root: INFO
    com.umojatech.researchiq: INFO

app:
  security:
    jwt:
      secretKey: ${JWT_SECRET}
      expirationMs: ${JWT_EXPIRATION_MS:3600000}
      refreshExpirationMs: ${JWT_REFRESH_EXPIRATION_MS:86400000}
      issuer: "researchiq-prod"
  bootstrap-admin:
    email: ${BOOTSTRAP_ADMIN_EMAIL}
    password: ${BOOTSTRAP_ADMIN_PASSWORD}
    name: ${BOOTSTRAP_ADMIN_NAME:System Admin}
